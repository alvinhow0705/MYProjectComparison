<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Recommend – MYProjectComparison</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <!-- NAV -->
    <nav>
        <a class="nav-brand" href="../index.html">🏠 MYProjectComparison</a>
        <div class="nav-links">
            <a href="../index.html">Projects</a>
            <a href="find.html">Smart Finder</a>
            <a href="recommend.html" class="active">AI Recommend</a>
            <a href="leads.html">Leads</a>
        </div>
    </nav>

    <div class="page">
        <h1 class="page-title">🤖 AI Property Advisor</h1>
        <p class="page-subtitle">Answer a few questions and get a personalised recommendation</p>

        <div class="finder-form">
            <div class="form-group">
                <label>Your Budget (RM)</label>
                <input id="budget" type="number" placeholder="e.g. 650000" min="0">
            </div>

            <div class="form-group">
                <label>Preferred Location</label>
                <select id="location">
                    <option value="Any">Any Location</option>
                    <option value="Bukit Jalil">Bukit Jalil</option>
                    <option value="Petaling Jaya">Petaling Jaya</option>
                    <option value="Subang Jaya">Subang Jaya</option>
                </select>
            </div>

            <div class="form-group">
                <label>Buying Purpose</label>
                <select id="purpose">
                    <option value="Own Stay">Own Stay</option>
                    <option value="Investment">Investment</option>
                    <option value="Both">Own Stay + Investment</option>
                </select>
            </div>

            <div class="form-group">
                <label>Lifestyle Priorities <span style="color:#aaa;font-weight:normal">(optional)</span></label>
                <select id="priority">
                    <option value="accessibility">Good accessibility / highway access</option>
                    <option value="schools">Near good schools</option>
                    <option value="investment">High rental yield potential</option>
                    <option value="facilities">Lifestyle facilities (pool, gym)</option>
                    <option value="value">Best value for money</option>
                </select>
            </div>

            <button id="aiBtn" style="width:100%;">✨ Get AI Recommendation</button>
        </div>

        <!-- AI Result -->
        <div id="aiResult" style="display:none;">
            <div style="background:white; border-radius:16px; padding:24px; box-shadow:0 4px 14px rgba(0,0,0,0.06); margin-top:8px;">
                <h3 style="margin-bottom:12px;">🤖 AI Advisor Says:</h3>
                <div id="aiText" style="font-size:15px; line-height:1.7; color:#333; white-space:pre-wrap;"></div>
            </div>
        </div>

        <!-- Loading -->
        <div id="aiLoading" style="display:none; text-align:center; padding:30px; color:#888;">
            <p style="font-size:32px; animation: spin 1s linear infinite; display:inline-block;">⏳</p>
            <p style="margin-top:10px;">Getting AI recommendation...</p>
        </div>

        <div class="back-row" style="margin-top:24px;">
            <button class="btn-outline" onclick="window.location.href='../index.html'">
                ← Back to Projects
            </button>
        </div>
    </div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
document.getElementById("aiBtn").addEventListener("click", async function () {
    const budget   = document.getElementById("budget").value;
    const location = document.getElementById("location").value;
    const purpose  = document.getElementById("purpose").value;
    const priority = document.getElementById("priority").value;

    if (!budget) {
        alert("Please enter your budget.");
        return;
    }

    // Load projects
    let projects = [];
    try {
        const res = await fetch('../data/projects.json');
        projects = await res.json();
    } catch (e) {
        alert("Could not load project data.");
        return;
    }

    // Show loading
    document.getElementById("aiLoading").style.display = "block";
    document.getElementById("aiResult").style.display  = "none";

    const projectList = projects.map(p =>
        `- ${p.name} | ${p.location} | ${p.price} | ${p.type} | Developer: ${p.developer}`
    ).join("\n");

    const prompt = `You are a friendly Malaysian property advisor helping a buyer choose the right property.

Buyer profile:
- Budget: RM${budget}
- Preferred location: ${location}
- Purpose: ${purpose}
- Priority: ${priority}

Available projects:
${projectList}

Give a warm, clear recommendation in 3-4 short paragraphs:
1. Which project(s) match their profile and why
2. What makes each one a good fit for their needs
3. One helpful tip for their situation

Write in a friendly, conversational tone. Keep it concise and practical. Do not use markdown formatting.`;

    try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "claude-sonnet-4-6",
                max_tokens: 1000,
                messages: [{ role: "user", content: prompt }]
            })
        });

        const data = await response.json();
        const text = data.content?.[0]?.text || "Sorry, I couldn't generate a recommendation. Please try again.";

        document.getElementById("aiText").innerText = text;
        document.getElementById("aiResult").style.display  = "block";
        document.getElementById("aiLoading").style.display = "none";
        document.getElementById("aiResult").scrollIntoView({ behavior: "smooth" });

    } catch (err) {
        document.getElementById("aiLoading").style.display = "none";
        alert("Error connecting to AI. Please try again.");
        console.error(err);
    }
});
</script>

</body>
</html>
